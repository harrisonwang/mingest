name: build-and-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            exe_ext: ""
          - runner: windows-latest
            goos: windows
            goarch: amd64
            exe_ext: ".exe"
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            exe_ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            exe_ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Build (slim)
        shell: bash
        run: |
          mkdir -p dist
          out="dist/mingest${{ matrix.exe_ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -trimpath -ldflags "-s -w -X mingest/ingest.version=${VERSION}" -o "$out" ./cmd/mingest

      - name: Package slim (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg="mingest_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}_slim"
          rm -rf package
          mkdir -p package/mingest out
          cp "dist/mingest" "package/mingest/mingest"
          cp README.md "package/mingest/" || true
          tar -C package -czf "out/${pkg}.tar.gz" mingest

      - name: Package slim (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "mingest_${env:VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}_slim"
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path package\mingest | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item "dist\mingest.exe" "package\mingest\mingest.exe"
          Copy-Item "README.md" "package\mingest\README.md"
          Compress-Archive -Path "package\mingest" -DestinationPath "out\$pkg.zip" -Force

      - name: Upload artifact (slim)
        uses: actions/upload-artifact@v4
        with:
          name: mingest_${{ matrix.goos }}_${{ matrix.goarch }}_slim
          path: |
            out/*.tar.gz
            out/*.zip

      - name: Download tools for embedding
        shell: bash
        run: |
          scripts/fetch-embed-tools.sh --os "${{ matrix.goos }}" --arch "${{ matrix.goarch }}"

      - name: Build (bundled)
        shell: bash
        run: |
          mkdir -p dist
          out="dist/mingest-bundled${{ matrix.exe_ext }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -tags embedtools -trimpath -ldflags "-s -w -X mingest/ingest.version=${VERSION}" -o "$out" ./cmd/mingest

      - name: Package bundled (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pkg="mingest_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}_bundled"
          rm -rf package
          mkdir -p package/mingest out
          cp "dist/mingest-bundled" "package/mingest/mingest"
          cp README.md "package/mingest/" || true
          cp THIRD_PARTY_LICENSES "package/mingest/" || true
          tar -C package -czf "out/${pkg}.tar.gz" mingest

      - name: Package bundled (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pkg = "mingest_${env:VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}_bundled"
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path package\mingest | Out-Null
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item "dist\mingest-bundled.exe" "package\mingest\mingest.exe"
          Copy-Item "README.md" "package\mingest\README.md"
          Copy-Item "THIRD_PARTY_LICENSES" "package\mingest\THIRD_PARTY_LICENSES"
          Compress-Archive -Path "package\mingest" -DestinationPath "out\$pkg.zip" -Force

      - name: Upload artifact (bundled)
        uses: actions/upload-artifact@v4
        with:
          name: mingest_${{ matrix.goos }}_${{ matrix.goarch }}_bundled
          path: |
            out/*.tar.gz
            out/*.zip

  release:
    if: github.ref_type == 'tag'
    name: release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          files=( *.zip *.tar.gz )
          if ((${#files[@]} == 0)); then
            echo "no artifacts found"
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*

  notify-homebrew-tap:
    if: github.ref_type == 'tag'
    name: notify homebrew tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Dispatch to homebrew-tap
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured" >&2
            exit 1
          fi

          payload="$(jq -n \
            --arg tool "mingest" \
            --arg tag "$TAG" \
            --arg repo "$REPO" \
            '{event_type:"tool-released", client_payload:{tool:$tool, tag:$tag, repo:$repo}}')"

          curl -fsSL -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/harrisonwang/homebrew-tap/dispatches" \
            -d "$payload"
